services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openmarket
      POSTGRES_USER: openmarket
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openmarket}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/packages/store/dist:/usr/share/nginx/html/store:ro
      - ./frontend/packages/admin/dist:/usr/share/nginx/html/admin:ro
      - ./frontend/packages/pos/dist:/usr/share/nginx/html/pos:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "--no-check-certificate", "https://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: openmarket
      POSTGRES_USER: openmarket
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openmarket}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "chmod +x /backup.sh && \
       while true; do \
         /backup.sh || echo 'backup failed'; \
         sleep 86400; \
       done"

volumes:
  pgdata:
