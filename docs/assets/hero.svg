<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="OpenMarket — the self-hosted alternative to Shopify">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.35">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200"/>
    <path d="M80 0 V400 M240 0 V400 M400 0 V400 M560 0 V400 M720 0 V400 M880 0 V400 M1040 0 V400"/>
  </g>

  <!-- Storefront glyph -->
  <g transform="translate(90,110)">
    <rect x="0" y="40" width="180" height="140" rx="10" fill="#0b1224" stroke="url(#accent)" stroke-width="3"/>
    <path d="M0 60 L20 20 L160 20 L180 60 Z" fill="url(#accent)" opacity="0.85"/>
    <rect x="30" y="90" width="50" height="60" fill="#22d3ee" opacity="0.25"/>
    <rect x="100" y="90" width="50" height="60" fill="#a78bfa" opacity="0.25"/>
    <circle cx="55" cy="170" r="4" fill="#e2e8f0"/>
    <circle cx="125" cy="170" r="4" fill="#e2e8f0"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(320,150)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="800" fill="#f8fafc">
      Open<tspan fill="url(#accent)">Market</tspan>
    </text>
    <text x="0" y="48" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="500" fill="#cbd5e1">
      The self-hosted, open-source alternative to Shopify.
    </text>
    <g transform="translate(0,80)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#94a3b8">
      <rect x="0" y="-20" width="110" height="32" rx="16" fill="#0b1224" stroke="#334155"/>
      <text x="55" y="0" text-anchor="middle" fill="#e2e8f0">Storefront</text>
      <rect x="120" y="-20" width="90" height="32" rx="16" fill="#0b1224" stroke="#334155"/>
      <text x="165" y="0" text-anchor="middle" fill="#e2e8f0">Admin</text>
      <rect x="220" y="-20" width="70" height="32" rx="16" fill="#0b1224" stroke="#334155"/>
      <text x="255" y="0" text-anchor="middle" fill="#e2e8f0">POS</text>
      <rect x="300" y="-20" width="110" height="32" rx="16" fill="#0b1224" stroke="#334155"/>
      <text x="355" y="0" text-anchor="middle" fill="#e2e8f0">FastAPI</text>
      <rect x="420" y="-20" width="130" height="32" rx="16" fill="#0b1224" stroke="#334155"/>
      <text x="485" y="0" text-anchor="middle" fill="#e2e8f0">PostgreSQL</text>
    </g>
  </g>
</svg>
